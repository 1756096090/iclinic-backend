spring.application.name=iclinic-backend
spring.profiles.active=h2

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# import.sql is automatically loaded from classpath:import.sql after DDL creation

# H2 Console (optional - access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# Telegram Bot Configuration
telegram.bot.token=8488844160:AAGHTthIc034kD2_6H2IErpEjMwzVcPzRJ4
telegram.bot.username=Jenkins1234bot
telegram.webhook.path=/api/v1/crm/webhooks/telegram
# URL base pública del servidor para registrar el webhook en Telegram al arrancar.
# Ejemplo con ngrok:   telegram.webhook.base-url=https://xxxx.ngrok-free.app
# Ejemplo cloudflare: telegram.webhook.base-url=https://xxxx.trycloudflare.com
# Dejar vacío para deshabilitar el auto-registro al arrancar.
telegram.webhook.base-url=
telegram.webhook.auto-register-enabled=false
telegram.webhook.auto-register.max-attempts=6
telegram.webhook.auto-register.retry-delay-seconds=15
telegram.webhook.auto-register.initial-delay-seconds=20
telegram.webhook.auto-register.initial-delay-seconds=8
telegram.webhook.cloudflare.enabled=false
telegram.webhook.cloudflare.command=cloudflared
telegram.webhook.cloudflare.local-port=${server.port:8080}
telegram.webhook.cloudflare.startup-timeout-seconds=25

# Secret de cifrado para AES-256/GCM (min 32 chars). En producción, usar variable de entorno.
encryption.secret-key=iclinic-dev-secret-key-32-chars!!